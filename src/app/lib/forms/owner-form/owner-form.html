<mat-dialog-content>

    <mat-form-field>
        <mat-label>Favorite Animal</mat-label>
        <input matInput [(ngModel)]="name" />
    </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
    <button matButton (click)="close()">Cerrar</button>
    <button matButton [mat-dialog-close]="save()" cdkFocusInitial>Ok</button>
</mat-dialog-actions>
