<div class="login-container" fxLayout="row" fxLayoutAlign="center center">
    <mat-card class="login-card">
        <mat-card-title>Sign in</mat-card-title>
        <mat-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email</mat-label>
                    <input matInput placeholder="you@example.com" formControlName="email" type="email" required
                        autocomplete="email" />
                    <mat-error [hidden]="!loginForm.get('email')?.hasError('required')">Email is required</mat-error>
                    <mat-error [hidden]="!loginForm.get('email')?.hasError('email')">Enter a valid email</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput placeholder="Password" formControlName="password" type="password" required
                        autocomplete="current-password" />


                </mat-form-field>

                <mat-checkbox formControlName="remember">Remember me</mat-checkbox>

                <div class="actions">
                    <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid">Sign
                        in</button>
                </div>
            </form>
        </mat-card-content>
        <mat-card-actions>

        </mat-card-actions>
    </mat-card>
</div>
