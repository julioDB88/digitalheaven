<div class="login-container" fxLayout="row" fxLayoutAlign="center center">

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div appearance="outline" class="full-width">
            <label>Email</label>
            <input placeholder="you@example.com" formControlName="email" type="email" required autocomplete="email" />
            <p [hidden]="!loginForm.get('email')?.hasError('required')">Email is required</p>
            <p [hidden]="!loginForm.get('email')?.hasError('email')">Enter a valid email</p>
        </div>

        <div class="full-width">
            <label>Password</label>
            <input placeholder="Password" formControlName="password" type="password" required
                autocomplete="current-password" />
        </div>
        <div>
            <button color="primary" type="submit">Sign
                in</button>
        </div>
    </form>


</div>
